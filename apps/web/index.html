<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>Muon Noi — Social Operating Space</title>
  <meta name="description" content="Muon Noi is an all-in-one social operating space: work, commerce, media, learning, messaging, and payments — privacy-first, no tracking." />
  <link rel="canonical" href="https://app.muonnoi.org/" />
  <meta property="og:title" content="Muon Noi — Social Operating Space" />
  <meta property="og:description" content="Work • Commerce • Media • Learn • Message • Pay. Privacy-first. No tracking." />
  <meta property="og:url" content="https://app.muonnoi.org/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />

  <link rel="stylesheet" href="/assets/ui.css" />
  <link rel="preload" href="/assets/icons.svg" as="image" type="image/svg+xml" />

  <meta name="theme-color" content="#070a0b" />

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"WebApplication",
    "name":"Muon Noi",
    "url":"https://app.muonnoi.org/",
    "applicationCategory":"SocialNetworkingApplication",
    "operatingSystem":"Web",
    "description":"An all-in-one social operating space: work, commerce, media, learning, messaging, payments — privacy-first."
  }
  </script>
</head>

<body>
  <!-- SVG sprite -->
  <div style="display:none">
    <object data="/assets/icons.svg" type="image/svg+xml" aria-hidden="true"></object>
  </div>

  <div class="app" data-theme="dark">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar__left">
        <button class="iconBtn" id="btnMenu" type="button" aria-label="Menu" data-action="menu">
          <svg class="icon" aria-hidden="true"><use href="#i-menu"></use></svg>
        </button>

        <a class="brand" href="/" data-nav="/" aria-label="Muon Noi Home">
          <span class="brand__mark"><span class="orb" aria-hidden="true"></span></span>
          <span class="brand__name">Muon Noi</span>
        </a>

        <div class="pillRow hide-sm" aria-label="Tags">
          <span class="pill">Work</span>
          <span class="pill">Commerce</span>
          <span class="pill">Media</span>
        </div>
      </div>

      <div class="topbar__mid">
        <div class="searchBar" role="search">
          <svg class="icon" aria-hidden="true"><use href="#i-search"></use></svg>
          <input class="searchBar__input" id="globalSearch" type="search" placeholder="Search…" autocomplete="off" />
          <button class="chipBtn" id="btnCommand" type="button" data-action="command" aria-label="Command">
            ⌘K
          </button>
        </div>
      </div>

      <div class="topbar__right">
        <button class="iconBtn" id="btnTheme" type="button" data-action="theme" aria-label="Theme">
          <svg class="icon" aria-hidden="true"><use id="themeIconUse" href="#i-moon"></use></svg>
        </button>

        <button class="langBtn" id="btnLang" type="button" data-action="lang" aria-label="Language">
          <span class="flag" id="flagA" aria-hidden="true">🇺🇸</span>
          <span class="flag" id="flagB" aria-hidden="true">🇻🇳</span>
          <span class="langCode" id="langCode">EN</span>
        </button>

        <button class="btn btn--ghost hide-sm" type="button" id="btnNoti" data-action="noti" aria-label="Notifications">
          <svg class="icon" aria-hidden="true"><use href="#i-chat"></use></svg>
          <span data-i18n="nav_inbox">Inbox</span>
        </button>
      </div>
    </header>

    <!-- LEFT RAIL -->
    <aside class="rail" id="rail" aria-label="Navigation">
      <div class="rail__head">
        <div class="rail__brand">
          <span class="brand__mark"><span class="orb orb--mini" aria-hidden="true"></span></span>
          <div>
            <div class="rail__title">Muon Noi</div>
            <div class="rail__sub">No tracking • Privacy-first</div>
          </div>
        </div>
        <button class="iconBtn" type="button" aria-label="Close" data-action="close-rail">
          <svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg>
        </button>
      </div>

      <nav class="rail__nav">
        <a class="navItem" href="/" data-nav="/">
          <svg class="icon" aria-hidden="true"><use href="#i-home"></use></svg>
          <span data-i18n="nav_home">Home</span>
        </a>

        <a class="navItem" href="/explore" data-nav="/explore">
          <svg class="icon" aria-hidden="true"><use href="#i-compass"></use></svg>
          <span data-i18n="nav_explore">Explore</span>
        </a>

        <a class="navItem" href="/create" data-nav="/create">
          <svg class="icon" aria-hidden="true"><use href="#i-edit"></use></svg>
          <span data-i18n="nav_create">Create</span>
        </a>

        <a class="navItem" href="/inbox" data-nav="/inbox">
          <svg class="icon" aria-hidden="true"><use href="#i-chat"></use></svg>
          <span data-i18n="nav_inbox">Inbox</span>
          <span class="badge" id="inboxBadge">3</span>
        </a>

        <div class="rail__sep"></div>

        <a class="navItem" href="/settings" data-nav="/settings">
          <svg class="icon" aria-hidden="true"><use href="#i-settings"></use></svg>
          <span data-i18n="nav_settings">Settings</span>
        </a>

        <a class="navItem" href="https://docs.muonnoi.org/" rel="noopener">
          <svg class="icon" aria-hidden="true"><use href="#i-compass"></use></svg>
          <span>Docs</span>
        </a>

        <a class="navItem" href="https://muonnoi.org/" rel="noopener">
          <svg class="icon" aria-hidden="true"><use href="#i-home"></use></svg>
          <span>muonnoi.org</span>
        </a>
      </nav>

      <div class="rail__foot">
        <div class="tiny muted">© Muon Noi</div>
      </div>
    </aside>

    <!-- RIGHT DRAWERS -->
    <aside class="drawer" id="searchDrawer" data-drawer="search" aria-label="Search Drawer">
      <div class="drawer__head">
        <div class="drawer__title">Search</div>
        <button class="iconBtn" type="button" aria-label="Close" data-action="close-drawer">
          <svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg>
        </button>
      </div>
      <div class="drawer__body">
        <input class="input" id="drawerSearchInput" placeholder="Type to search…" />
        <div class="drawerList">
          <button class="rowBtn" type="button" data-go="/create">Create</button>
          <button class="rowBtn" type="button" data-go="/explore">Explore</button>
          <button class="rowBtn" type="button" data-go="/settings">Settings</button>
        </div>
      </div>
    </aside>

    <aside class="drawer" id="notiDrawer" data-drawer="noti" aria-label="Notifications Drawer">
      <div class="drawer__head">
        <div class="drawer__title">Inbox</div>
        <button class="iconBtn" type="button" aria-label="Close" data-action="close-drawer">
          <svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg>
        </button>
      </div>
      <div class="drawer__body">
        <div class="noteCard">
          <div class="noteCard__title">System</div>
          <div class="noteCard__text">Inbox shell is ready. Messaging module will plug in next.</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="pageHead">
        <div>
          <div class="pageTitle" id="pageTitle">Home</div>
          <div class="pageSub" id="pageSub">Social operating space.</div>
        </div>
        <div class="pageHead__actions">
          <button class="btn btn--primary" type="button" data-go="/create">
            <svg class="icon" aria-hidden="true"><use href="#i-plus"></use></svg>
            <span data-i18n="cta_create">Create</span>
          </button>
          <button class="btn btn--ghost" type="button" data-go="/explore">
            <svg class="icon" aria-hidden="true"><use href="#i-compass"></use></svg>
            <span data-i18n="cta_explore">Explore</span>
          </button>
          <button class="btn btn--ghost" type="button" data-action="search">
            <svg class="icon" aria-hidden="true"><use href="#i-search"></use></svg>
            <span data-i18n="cta_search">Search</span>
          </button>
        </div>
      </div>

      <div id="view" class="view"></div>
    </main>

    <!-- COMMAND MODAL -->
    <section class="modal" id="commandModal" hidden aria-label="Command">
      <div class="modal__card glass3">
        <div class="modal__head">
          <div class="modal__title">Command</div>
          <button class="iconBtn" type="button" aria-label="Close" data-action="close-modal">
            <svg class="icon" aria-hidden="true"><use href="#i-x"></use></svg>
          </button>
        </div>
        <div class="modal__body">
          <input class="input" id="cmdInput" placeholder="Type a command…" />
          <div class="cmdList">
            <button class="cmdItem" type="button" data-go="/create"><span>Create</span><span class="kbd">C</span></button>
            <button class="cmdItem" type="button" data-go="/explore"><span>Explore</span><span class="kbd">E</span></button>
            <button class="cmdItem" type="button" data-go="/settings"><span>Settings</span><span class="kbd">S</span></button>
          </div>
          <div class="tiny muted" style="margin-top:10px">ESC to close.</div>
        </div>
      </div>
    </section>

    <!-- TABBAR (MOBILE) -->
    <nav class="tabbar" aria-label="Tabbar">
      <a class="tab" href="/" data-tab="/">
        <svg class="icon" aria-hidden="true"><use href="#i-home"></use></svg>
        <span data-i18n="nav_home">Home</span>
      </a>
      <a class="tab" href="/explore" data-tab="/explore">
        <svg class="icon" aria-hidden="true"><use href="#i-compass"></use></svg>
        <span data-i18n="nav_explore">Explore</span>
      </a>
      <a class="tab tab--center" href="/create" data-tab="/create" aria-label="Create">
        <div class="tabPlus">+</div>
      </a>
      <a class="tab" href="/inbox" data-tab="/inbox">
        <svg class="icon" aria-hidden="true"><use href="#i-chat"></use></svg>
        <span data-i18n="nav_inbox">Inbox</span>
      </a>
      <a class="tab" href="/settings" data-tab="/settings">
        <svg class="icon" aria-hidden="true"><use href="#i-settings"></use></svg>
        <span data-i18n="nav_settings">Settings</span>
      </a>
    </nav>
  </div>

  <!-- NO INLINE JS: load as external to satisfy CSP -->
  <script src="/assets/ui.js" defer></script>
</body>
</html>
